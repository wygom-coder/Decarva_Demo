<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DAAT 중고마켓 - 리뉴얼 준비중</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; padding: 40px; background: #fff; color: #042C53; line-height: 1.5; }
    .dev-notice { padding: 30px; background: #f8fafd; border: 1px dashed #185FA5; border-radius: 12px; text-align: center; }
    .dev-notice h2 { margin-bottom: 12px; color: #185FA5; }
    .dev-notice p { color: #555; }
  </style>
</head>
<body>

  <!-- ================================================== -->
  <!-- ▼ 1. 여기에 대표님의 새로운 디자인(UI)이 들어갈 자리입니다 ▼ -->
  <!-- ================================================== -->
  
  <div class="dev-notice">
    <h2>🛠 DAAT UI 전면 리뉴얼 준비 중</h2>
    <p>기존의 껍데기(디자인 코드)는 안전하게 전량 폐기(초기화) 되었습니다.<br>새로운 디자인(HTML/CSS) 작업이 완료되면 이곳에 덮어씌울 예정입니다.</p>
    <p style="margin-top: 16px; font-size: 13px; color: #1D9E75; font-weight: bold;">(※ 하단 스크립트에는 Supabase 연동 핵심 두뇌 로직이 보존되어 대기 중입니다!)</p>
  </div>

  <!-- ======================================================= -->
  <!-- ▼ 2. 껍데기가 바뀌어도 영원히 유지될 '데이터베이스 뇌(Brain)' ▼ -->
  <!-- ======================================================= -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // [인증] Supabase 접속 세팅 (절대 삭제 금지)
    const SUPABASE_URL = 'https://conlrhslgepktvajvgvb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_n2kbcfymcwb4Nna5hN7wsA_TRKixOG5';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /**
     * [핵심 로직 1] DB에서 상품 데이터 가져오기 (Select)
     * - 언제든지 이 함수를 부르면 상품 목록 배열을 던져줍니다.
     */
    async function fetchProductsFromDB() {
      const { data, error } = await supabaseClient
        .from('products')
        .select('*')
        .order('created_at', { ascending: false });
        
      if (error) {
        console.error("DB 로드 에러:", error.message);
        return []; 
      }
      return data; 
    }

    /**
     * [핵심 로직 2] DB로 새 상품 쏘아보내기 (Insert)
     * - 새 폼 화면이 만들어지면 입력값들을 뭉쳐 이 함수에 던져주기만 하면 됩니다.
     */
    async function insertProductToDB(productData) {
      const { data, error } = await supabaseClient
        .from('products')
        .insert([productData]);

      if (error) {
        console.error("DB 등록 실패:", error.message);
        return false;
      }
      return true;
    }

    /*
     * 💡 개발 메모:
     * 추후 새 디자인 코드가 완성되면, 특정 버튼에 onclick 이벤트만 걸어서
     * fetchProductsFromDB() 나 insertProductToDB() 를 갖다 붙이기만 하면
     * 마법처럼 DB와 즉각 연결됩니다.
     */
  </script>
</body>
</html>
